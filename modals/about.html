<div class="modal fade" id="aboutModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">About Diachron DB</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <figure class='figure'>
                    <figcaption>What is this?</figcaption>
                    <p>
                        Languages change their sounds over time in regular, predictable ways.
                        Latin's <em>k</em> softened into the <em>ch</em> of Italian; a scatter of
                        Proto-Indo-European consonants hardened into the sounds described by
                        Grimm's Law on their way to becoming Germanic. Diachron DB is a database
                        of those sound changes — collected from historical/comparative linguistics
                        sources (originally seeded from the
                        <a href="https://chridd.nfshost.com/diachronica/all" target="_blank">Index Diachronica</a>)
                        and organized so they can be searched, compared, and edited directly in
                        the browser.
                    </p>
                </figure>
                <figure class='figure'>
                    <figcaption>How to read the data</figcaption>
                    <ul class='list-unstyled'>
                        <li><strong>Transition</strong> — a language relationship, e.g. "Latin → Sardinian": the set of sound changes that occurred going from a source language to a descendant/related one.</li>
                        <li><strong>Pair</strong> — one specific correspondence within a transition: a <strong>Source</strong> sound (IPA symbol) that became a <strong>Target</strong> sound. Latin <em>k</em> → Sardinian <em>k</em> is one row; Latin <em>e</em> → Sardinian <em>i</em> is another.</li>
                        <li><strong>Environment</strong> — the phonological context that conditions the change (e.g. "before a vowel," "word-final"), written with the shorthand notation in the abbreviations key below.</li>
                        <li><strong>Notes</strong> — citations, exceptions, or other detail on a specific pair.</li>
                    </ul>
                    <p>
                        Pick a source and target language above to filter to their transition, or
                        hit <strong>Random</strong> to browse. Data can be added or corrected
                        directly through the table — this project is meant to be community-editable,
                        not a fixed reference.
                    </p>
                </figure>
                <figure class='figure'>
                    <figcaption>Key to Abbreviations</figcaption>
                    <ul class="list-unstyled">
                        <li>ˈ = Stress</li>
                        <li>! = Except when…</li>
                        <li>(…X) = For any number of X remaining</li>
                        <li>X₀ = The same/an identical X</li>
                        <li>Xⁿ = X with a given tone</li>
                        <li>Xₙ = The nth X of a sequence or series</li>
                        <li>Xₓ = All X of a sequence or series</li>
                        <li>X̣ = Retroflex/emphatic X</li>
                        <li># = Word boundary</li>
                        <li>$ = Stem boundary</li>
                        <li>% = Syllable boundary</li>
                        <li>∅ = Nothing/Null/Zero</li>
                        <li>A = Affricate</li>
                        <li>B = Back Vowel</li>
                        <li>C = Consonant</li>
                        <li>D = Voiced Plosive</li>
                        <li>E = Front vowel</li>
                        <li>F = Fricative</li>
                        <li>H = Laryngeal</li>
                        <li>J = Approximant</li>
                        <li>K = Velar</li>
                        <li>Ḱ = Palatovelar</li>
                        <li>L = Liquid</li>
                        <li>M = Diphthong</li>
                        <li>N = Nasal</li>
                        <li>O = Obstruent</li>
                        <li>P = (Bi)labial</li>
                        <li>Q = Uvular consonant; click consonant (Khoisan)</li>
                        <li>R = Resonant/Sonorant</li>
                        <li>S = Plosive</li>
                        <li>T = Voiceless Plosive</li>
                        <li>U = Syllable</li>
                        <li>V = Vowel</li>
                        <li>W = Semivowel</li>
                        <li>Z = Continuant</li>
                    </ul>
                </figure>
            </div>
            <div class="modal-footer">
            </div>
        </div>
    </div>
</div>
